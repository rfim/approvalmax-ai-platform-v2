name: Generate dbt and GE for Approved CDC Contexts

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "metadata/supported_cdc_contexts.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-dbt-ge-pr:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Generate dbt models for newly approved contexts
        run: |
          python scripts/generate_approved_cdc_dbt.py --previous-ref HEAD^

      - name: Create dbt and GE modelling draft PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add generated dbt and GE coverage for approved CDC contexts"
          branch: codex/generated-dbt-approved-cdc-${{ github.run_id }}
          title: "[AI-DRAFT] Generate dbt and GE coverage for approved CDC contexts"
          draft: true
          body: |
            This PR was generated after a CDC context metadata PR was merged with approved contexts.

            Human review checklist:
            - [ ] Confirm each generated model matches the approved CDC context grain
            - [ ] Confirm business keys match the approved metadata
            - [ ] Confirm generated current-state tables are covered by Great Expectations-style validation
            - [ ] Confirm no financial metrics were added or redefined
            - [ ] Confirm dbt compile/run/test pass before merge
          labels: |
            ai-draft
            dbt
            approved-cdc-context
