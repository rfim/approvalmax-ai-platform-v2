name: Run Pokemon Incremental Ingestion

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write
  pull-requests: write

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  POKEMON_VOLUME_PATH: dbfs:/Volumes/approvalmax_ai_platform/bronze/pokemon_ingestion/pokeapi_random_pokemon.jsonl

jobs:
  run-pokemon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main

      - name: Fetch 10 random Pokemon
        run: python scripts/fetch_random_pokemon.py --count 10 --output tmp/pokeapi_random_pokemon.jsonl

      - name: Check Databricks auth
        run: databricks current-user me

      - name: Validate deployed bundle config
        run: databricks bundle validate -t dev

      - name: Deploy Pokemon ingestion bundle resources
        run: databricks bundle deploy -t dev

      - name: Upload Pokemon JSONL to UC Volume
        run: databricks fs cp tmp/pokeapi_random_pokemon.jsonl "$POKEMON_VOLUME_PATH" --overwrite

      - name: Run Pokemon incremental ingestion
        run: databricks bundle run approvalmax_pokemon_incremental_serverless -t dev

      - name: Create Pokemon modelling suggestion
        run: python scripts/create_pokemon_context_suggestion.py

      - name: Create Pokemon candidate PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add Pokemon actor context candidate"
          branch: codex/pokemon-actor-context-${{ github.run_id }}
          title: "[AI-DRAFT] Add Pokemon actor modelling candidate"
          draft: true
          body: |
            Ten random Pokemon were fetched from PokeAPI and ingested as demo actors.

            This PR proposes human-reviewed modelling metadata and documentation for:
            - Silver: `pokemon_actors_current`
            - Silver bridge: `user_pokemon_actor_bridge`
            - Vault: `hub_pokemon_actor`, `sat_pokemon_actor_profile`
            - Gold: `dim_pokemon_actor`
            - Gold enrichment: `fact_approval_document_lifecycle_pokemon_actor`
            - dbt: generated after approval
            - GE: generated/current-state checks after approval

            Safety checklist:
            - [ ] Confirm `pokemon_key` as the business key
            - [ ] Confirm Pokemon can be treated as random demo actors
            - [ ] Confirm actor assignment and enrichment rules
            - [ ] Confirm no financial metrics are changed
          labels: |
            ai-draft
            pokemon
            new-cdc-context
